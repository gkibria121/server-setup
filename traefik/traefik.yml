api:
  dashboard: true
  insecure: true

log:
  level: INFO

entryPoints:
  web-http:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: web
          scheme: https
  web:
    address: ":443"
    http:
      tls:
        certResolver: letsencrypt
  db:
    address: ":5432"

providers:
  docker:
    exposedByDefault: false
  file:
    filename: /etc/traefik/dynamic.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: admin@gkibria121.com
      storage: /letsencrypt/acme.json
      httpChallenge:
        entryPoint: web-http
